<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShelfMonitor — Vigilância de Prateleira</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg:       #080c10;
    --panel:    #0d1318;
    --border:   #1a2a35;
    --accent:   #00e5ff;
    --warn:     #ff3d3d;
    --ok:       #00e676;
    --dim:      #3a5060;
    --text:     #c8dde8;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .logo span { color: var(--dim); }

  .header-stats {
    display: flex;
    gap: 28px;
  }

  .hstat {
    text-align: center;
  }
  .hstat-val {
    font-family: var(--mono);
    font-size: 1.3rem;
    color: var(--accent);
  }
  .hstat-lbl {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 8px var(--ok);
    display: inline-block;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  /* ── Layout ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 1fr;
    gap: 12px;
    padding: 12px;
  }

  /* ── Feed ── */
  .feed-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .feed-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #stream {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Scan-line overlay */
  .feed-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,229,255,0.015) 2px,
      rgba(0,229,255,0.015) 4px
    );
    pointer-events: none;
  }

  /* Corner markers */
  .corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.6;
  }
  .corner.tl { top:8px;  left:8px;  border-width: 2px 0 0 2px; }
  .corner.tr { top:8px;  right:8px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom:8px; left:8px;  border-width: 0 0 2px 2px; }
  .corner.br { bottom:8px; right:8px; border-width: 0 2px 2px 0; }

  .cam-label {
    position: absolute;
    bottom: 10px; left: 12px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    opacity: 0.7;
    letter-spacing: 0.1em;
  }

  .ts-label {
    position: absolute;
    bottom: 10px; right: 12px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--dim);
  }

  /* ── Side Panel ── */
  .side {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* Stats cards */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .stat-cell {
    background: var(--panel);
    padding: 14px 12px;
    text-align: center;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 1.6rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-lbl {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
    margin-top: 4px;
  }

  /* Alert banner */
  #alert-banner {
    display: none;
    padding: 10px 14px;
    background: rgba(255,61,61,0.12);
    border: 1px solid var(--warn);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--warn);
    text-align: center;
    animation: blink-border 0.5s step-end infinite;
  }
  @keyframes blink-border {
    0%,100% { border-color: var(--warn); }
    50%      { border-color: transparent; }
  }

  /* Events log */
  .events-log {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #events-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
    max-height: 340px;
  }

  #events-list::-webkit-scrollbar { width: 4px; }
  #events-list::-webkit-scrollbar-track { background: transparent; }
  #events-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 14px;
    border-bottom: 1px solid rgba(26,42,53,0.6);
    transition: background 0.2s;
    animation: slide-in 0.25s ease;
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(12px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .event-item:hover { background: rgba(0,229,255,0.04); }

  .event-icon {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--warn);
    box-shadow: 0 0 6px var(--warn);
    flex-shrink: 0;
    margin-top: 5px;
  }

  .event-body { flex: 1; min-width: 0; }

  .event-product {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text);
    text-transform: capitalize;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-meta {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--dim);
    margin-top: 2px;
  }

  .empty-msg {
    text-align: center;
    padding: 30px 0;
    color: var(--dim);
    font-size: 0.8rem;
    font-family: var(--mono);
  }

  /* Bar chart */
  .bar-wrap {
    padding: 10px 14px 14px;
  }

  .bar-item {
    margin-bottom: 8px;
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--text);
    margin-bottom: 3px;
  }

  .bar-track {
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00b8d4);
    border-radius: 3px;
    transition: width 0.5s ease;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Shelf<span>Monitor</span> &nbsp;/&nbsp; OV5647</div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="h-fps">0.0</div>
      <div class="hstat-lbl">FPS</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="h-total">0</div>
      <div class="hstat-lbl">Interações</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="h-uptime">00:00:00</div>
      <div class="hstat-lbl">Uptime</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="status-dot"></div>
      <span style="font-size:0.7rem;color:var(--dim);font-family:var(--mono)">AO VIVO</span>
    </div>
  </div>
</header>

<div class="main">

  <!-- ── Feed ── -->
  <div class="feed-panel">
    <div class="panel-header">
      <span>◈</span> CAM-01 &nbsp;·&nbsp; ÁREA PRATELEIRA
    </div>
    <div class="feed-wrap">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <img id="stream" src="/video_feed" alt="stream">
      <div class="cam-label">CAM-01 / OV5647 / 130° FOV</div>
      <div class="ts-label" id="ts">--:--:--</div>
    </div>
  </div>

  <!-- ── Side ── -->
  <div class="side">

    <!-- Alert banner -->
    <div id="alert-banner">⚠ INTERAÇÃO DETECTADA</div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-val" id="s-today">0</div>
        <div class="stat-lbl">Hoje</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="s-last-min">0</div>
        <div class="stat-lbl">Último minuto</div>
      </div>
    </div>

    <!-- Top produtos -->
    <div class="card">
      <div class="panel-header"><span>▸</span> Top Produtos Tocados</div>
      <div class="bar-wrap" id="top-products">
        <div class="empty-msg">aguardando dados...</div>
      </div>
    </div>

    <!-- Eventos -->
    <div class="card events-log">
      <div class="panel-header"><span>▸</span> Log de Eventos</div>
      <div id="events-list">
        <div class="empty-msg">nenhum evento ainda</div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── Relógio ──────────────────────────────────────────────────
  function tick() {
    document.getElementById('ts').textContent =
      new Date().toLocaleTimeString('pt-BR');
  }
  setInterval(tick, 1000);
  tick();

  // ── Estado local ──────────────────────────────────────────────
  let knownEvents = [];
  let productCounts = {};
  let lastMinuteEvents = [];
  let alertTimeout = null;

  // ── Polling de stats ─────────────────────────────────────────
  async function fetchStats() {
    try {
      const r = await fetch('/api/stats');
      const d = await r.json();
      document.getElementById('h-fps').textContent    = d.fps.toFixed(1);
      document.getElementById('h-total').textContent  = d.total_interactions;
      document.getElementById('h-uptime').textContent = d.uptime;
    } catch(e) {}
  }

  // ── Polling de eventos ────────────────────────────────────────
  async function fetchEvents() {
    try {
      const r = await fetch('/api/events');
      const events = await r.json();

      const newCount = events.length - knownEvents.length;
      if (newCount > 0) {
        triggerAlert(events[0].product);
        events.slice(0, newCount).forEach(ev => {
          productCounts[ev.product] = (productCounts[ev.product] || 0) + 1;
          lastMinuteEvents.push(Date.now());
        });
      }

      knownEvents = events;
      renderEvents(events);
      renderTopProducts();
      renderLastMinute();
      document.getElementById('s-today').textContent = events.length;
    } catch(e) {}
  }

  function renderEvents(events) {
    const el = document.getElementById('events-list');
    if (events.length === 0) {
      el.innerHTML = '<div class="empty-msg">nenhum evento ainda</div>';
      return;
    }
    el.innerHTML = events.slice(0, 40).map(ev => `
      <div class="event-item">
        <div class="event-icon"></div>
        <div class="event-body">
          <div class="event-product">${ev.product}</div>
          <div class="event-meta">${ev.time} &nbsp;·&nbsp; ${ev.frames} frames</div>
        </div>
      </div>
    `).join('');
  }

  function renderTopProducts() {
    const el = document.getElementById('top-products');
    const entries = Object.entries(productCounts).sort((a,b) => b[1]-a[1]).slice(0,5);
    if (entries.length === 0) {
      el.innerHTML = '<div class="empty-msg">aguardando dados...</div>';
      return;
    }
    const max = entries[0][1];
    el.innerHTML = entries.map(([label, count]) => `
      <div class="bar-item">
        <div class="bar-label"><span>${label}</span><span>${count}</span></div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(count/max*100).toFixed(1)}%"></div>
        </div>
      </div>
    `).join('');
  }

  function renderLastMinute() {
    const cutoff = Date.now() - 60000;
    lastMinuteEvents = lastMinuteEvents.filter(t => t > cutoff);
    document.getElementById('s-last-min').textContent = lastMinuteEvents.length;
  }

  function triggerAlert(product) {
    const banner = document.getElementById('alert-banner');
    banner.textContent = `⚠ INTERAÇÃO: ${product.toUpperCase()}`;
    banner.style.display = 'block';
    clearTimeout(alertTimeout);
    alertTimeout = setTimeout(() => { banner.style.display = 'none'; }, 3000);
  }

  // ── Iniciar polling ───────────────────────────────────────────
  setInterval(fetchStats,  2000);
  setInterval(fetchEvents, 1500);
  fetchStats();
  fetchEvents();
</script>
</body>
</html>
